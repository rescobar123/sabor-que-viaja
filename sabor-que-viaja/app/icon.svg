<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>

  <!-- Fondo con gradiente -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Casa/granero minimalista geométrico -->
  <!-- Techo -->
  <polygon points="16,5 27,14 5,14" fill="white" opacity="0.95"/>
  <!-- Cuerpo -->
  <rect x="7" y="14" width="18" height="13" rx="1" fill="white" opacity="0.85"/>
  <!-- Puerta centrada -->
  <rect x="13" y="19" width="6" height="8" rx="2" fill="#065f46"/>

  <!-- Punto de ubicación arriba derecha (tech) -->
  <circle cx="25" cy="7" r="3" fill="#fbbf24"/>
  <circle cx="25" cy="7" r="1.5" fill="#065f46"/>
</svg>
